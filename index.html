<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#101820">
    <title>Domótica Luces</title>
    <style>
:root {
  color-scheme: light;
  --bg: #f3f6f4;
  --surface: #ffffff;
  --surface-strong: #eef3f0;
  --text: #101820;
  --muted: #5f6f68;
  --line: #d8e0dc;
  --accent: #007c89;
  --accent-dark: #005f69;
  --warn: #c2410c;
  --ok: #15803d;
  --shadow: 0 18px 45px rgba(16, 24, 32, 0.12);
}

* {
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

button,
input {
  font: inherit;
}

button {
  cursor: pointer;
}

.app-shell {
  width: min(960px, 100%);
  min-height: 100vh;
  margin: 0 auto;
  padding: calc(18px + env(safe-area-inset-top)) 16px calc(24px + env(safe-area-inset-bottom));
}

.topbar,
.status-strip,
.toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.topbar {
  margin-bottom: 18px;
}

.eyebrow {
  margin: 0 0 4px;
  color: var(--accent-dark);
  font-size: 0.75rem;
  font-weight: 800;
  letter-spacing: 0;
  text-transform: uppercase;
}

h1,
h2 {
  margin: 0;
  letter-spacing: 0;
}

h1 {
  font-size: clamp(2rem, 8vw, 3.25rem);
  line-height: 0.98;
}

h2 {
  font-size: 1.45rem;
}

.icon-button,
.secondary-button,
.primary-button,
.segment,
.action-button,
.light-main {
  border: 1px solid transparent;
  border-radius: 8px;
  transition: transform 140ms ease, background 140ms ease, border-color 140ms ease;
}

.icon-button {
  width: 46px;
  height: 46px;
  flex: 0 0 auto;
  display: grid;
  place-items: center;
  background: var(--surface);
  box-shadow: 0 8px 25px rgba(16, 24, 32, 0.08);
  font-size: 1.3rem;
}

.status-strip {
  margin-bottom: 14px;
  padding: 13px 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
}

.status-label {
  display: block;
  color: var(--muted);
  font-size: 0.78rem;
  font-weight: 700;
}

.connection-dot {
  width: 14px;
  height: 14px;
  flex: 0 0 auto;
  border-radius: 50%;
  background: #9ca3af;
}

.connection-dot.is-ok {
  background: var(--ok);
}

.connection-dot.is-error {
  background: var(--warn);
}

.toolbar {
  align-items: stretch;
  margin-bottom: 16px;
}

.segmented-control {
  display: grid;
  grid-template-columns: 1fr 1fr;
  flex: 1 1 auto;
  padding: 4px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface-strong);
}

.segment {
  min-height: 42px;
  padding: 0 12px;
  background: transparent;
  color: var(--muted);
  font-weight: 800;
}

.segment.is-active {
  background: var(--surface);
  color: var(--text);
  box-shadow: 0 6px 16px rgba(16, 24, 32, 0.08);
}

.secondary-button,
.primary-button,
.action-button {
  min-height: 46px;
  padding: 0 15px;
  font-weight: 850;
}

.secondary-button {
  border-color: var(--line);
  background: var(--surface);
  color: var(--text);
}

.primary-button,
.action-button {
  background: var(--accent);
  color: white;
}

.action-button.off-button {
  background: #2f3a36;
}

.lights-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.light-card {
  min-width: 0;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
  box-shadow: 0 10px 30px rgba(16, 24, 32, 0.08);
  overflow: hidden;
}

.light-main {
  width: 100%;
  min-height: 112px;
  display: flex;
  align-items: center;
  gap: 13px;
  padding: 14px;
  background: transparent;
  color: inherit;
  text-align: left;
}

.light-icon {
  width: 52px;
  height: 52px;
  flex: 0 0 auto;
  display: grid;
  place-items: center;
  border-radius: 8px;
  background: #e3f3f4;
  color: var(--accent-dark);
  font-size: 1.7rem;
}

.light-text {
  min-width: 0;
  display: grid;
  gap: 4px;
}

.light-name {
  overflow-wrap: anywhere;
  font-size: 1.03rem;
  line-height: 1.15;
}

.light-zone {
  color: var(--muted);
  font-size: 0.86rem;
  font-weight: 750;
}

.light-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 0 12px 12px;
}

.light-status {
  min-height: 32px;
  margin: 0;
  padding: 0 12px 12px;
  color: var(--muted);
  font-size: 0.85rem;
  font-weight: 700;
}

.light-card.is-working {
  border-color: var(--accent);
}

.light-card.is-error .light-status {
  color: var(--warn);
}

.light-card.is-ok .light-status {
  color: var(--ok);
}

.big-mode .lights-grid {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.big-mode .light-card {
  min-height: 156px;
}

.big-mode .light-main {
  min-height: 156px;
  flex-direction: column;
  justify-content: center;
  text-align: center;
}

.big-mode .light-icon {
  width: 72px;
  height: 72px;
  font-size: 2.25rem;
}

.big-mode .light-actions {
  display: none;
}

.big-mode .light-status {
  min-height: 0;
  padding-bottom: 14px;
  text-align: center;
}

.settings-dialog {
  width: min(440px, calc(100% - 28px));
  padding: 0;
  border: 0;
  border-radius: 8px;
  background: transparent;
}

.settings-dialog::backdrop {
  background: rgba(16, 24, 32, 0.52);
}

.settings-panel {
  display: grid;
  gap: 16px;
  padding: 18px;
  border-radius: 8px;
  background: var(--surface);
  box-shadow: var(--shadow);
}

.field {
  display: grid;
  gap: 7px;
  color: var(--muted);
  font-weight: 800;
}

.field input {
  width: 100%;
  min-height: 48px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 0 12px;
  color: var(--text);
}

.field-help {
  margin: -6px 0 0;
  color: var(--muted);
  font-size: 0.88rem;
}

.dialog-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 0;
  padding: 0;
}

button:focus-visible,
input:focus-visible {
  outline: 3px solid rgba(0, 124, 137, 0.32);
  outline-offset: 2px;
}

@media (hover: hover) {
  button:hover {
    transform: translateY(-1px);
  }
}

@media (max-width: 520px) {
  .app-shell {
    padding-left: 12px;
    padding-right: 12px;
  }

  .toolbar {
    display: grid;
  }

  .secondary-button {
    width: 100%;
  }

  .lights-grid {
    grid-template-columns: 1fr;
  }

  .big-mode .lights-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .big-mode .light-name {
    font-size: 0.98rem;
  }
}

@media (min-width: 820px) {
  .lights-grid,
  .big-mode .lights-grid {
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }
}

    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Panel INL8</p>
          <h1>Luces de casa</h1>
        </div>
        <button class="icon-button" id="settingsButton" type="button" aria-label="Ajustes" title="Ajustes">
          <span aria-hidden="true">⚙</span>
        </button>
      </header>

      <main>
        <section class="status-strip" aria-live="polite">
          <div>
            <span class="status-label">Panel</span>
            <strong id="baseUrlLabel">Sin configurar</strong>
          </div>
          <span class="connection-dot" id="connectionDot" aria-hidden="true"></span>
        </section>

        <section class="toolbar" aria-label="Controles de vista">
          <div class="segmented-control" role="group" aria-label="Modo de visualizacion">
            <button class="segment is-active" id="fullModeButton" type="button">Completo</button>
            <button class="segment" id="bigModeButton" type="button">Botones grandes</button>
          </div>
          <button class="secondary-button" id="changeIpButton" type="button">Cambiar IP</button>
        </section>

        <section class="lights-grid" id="lightsGrid" aria-label="Zonas de luces"></section>
      </main>
    </div>

    <dialog class="settings-dialog" id="settingsDialog">
      <form method="dialog" class="settings-panel" id="settingsForm">
        <header>
          <p class="eyebrow">Configuración</p>
          <h2>IP del panel</h2>
        </header>
        <label class="field">
          <span>Dirección IP o URL base</span>
          <input id="ipInput" name="ip" type="text" inputmode="url" autocomplete="off" placeholder="192.168.1.100" required>
        </label>
        <p class="field-help">Ejemplo: 192.168.1.100 o http://192.168.1.100</p>
        <menu class="dialog-actions">
          <button class="secondary-button" id="cancelSettingsButton" value="cancel" type="button">Cancelar</button>
          <button class="primary-button" value="save" type="submit">Guardar</button>
        </menu>
      </form>
    </dialog>

    <template id="lightCardTemplate">
      <article class="light-card">
        <button class="light-main" type="button">
          <span class="light-icon" aria-hidden="true"></span>
          <span class="light-text">
            <strong class="light-name"></strong>
            <span class="light-zone"></span>
          </span>
        </button>
        <div class="light-actions">
          <button class="action-button on-button" type="button">Encender</button>
          <button class="action-button off-button" type="button">Apagar</button>
        </div>
        <p class="light-status" aria-live="polite"></p>
      </article>
    </template>

    <script>
const STORAGE_KEYS = {
  baseUrl: "domoticaLuces.baseUrl",
  mode: "domoticaLuces.mode",
};

const DEFAULT_PANEL = "http://192.168.1.100";
const IS_ANDROID = /\bAndroid\b/i.test(navigator.userAgent);

const ZONES = [
  { id: 1, name: "Sala principal", icon: "🛏" },
  { id: 2, name: "Habitación auxiliar", icon: "🛌" },
  { id: 3, name: "Pasillo", icon: "🚪" },
  { id: 4, name: "Estudio", icon: "💻" },
  { id: 5, name: "Cocina", icon: "🍳" },
  { id: 6, name: "Comedor", icon: "🍽" },
  { id: 7, name: "Sala", icon: "🛋" },
  { id: 8, name: "Balcón", icon: "🌇" },
];

function readStoredValue(key, fallback = "") {
  try {
    return localStorage.getItem(key) || fallback;
  } catch (error) {
    return fallback;
  }
}

function writeStoredValue(key, value) {
  try {
    localStorage.setItem(key, value);
  } catch (error) {
    // Some Android file managers open local HTML as content:// and block storage.
  }
}

const state = {
  baseUrl: readStoredValue(STORAGE_KEYS.baseUrl),
  mode: readStoredValue(STORAGE_KEYS.mode, "full"),
};

const appShell = document.querySelector(".app-shell");
const baseUrlLabel = document.querySelector("#baseUrlLabel");
const connectionDot = document.querySelector("#connectionDot");
const lightsGrid = document.querySelector("#lightsGrid");
const template = document.querySelector("#lightCardTemplate");
const settingsDialog = document.querySelector("#settingsDialog");
const settingsForm = document.querySelector("#settingsForm");
const ipInput = document.querySelector("#ipInput");
const settingsButton = document.querySelector("#settingsButton");
const changeIpButton = document.querySelector("#changeIpButton");
const cancelSettingsButton = document.querySelector("#cancelSettingsButton");
const fullModeButton = document.querySelector("#fullModeButton");
const bigModeButton = document.querySelector("#bigModeButton");
const commandFrame = document.createElement("iframe");
commandFrame.name = "commandFrame";
commandFrame.title = "Comandos del panel";
commandFrame.hidden = true;
document.body.appendChild(commandFrame);

function normalizeBaseUrl(value) {
  const trimmed = value.trim().replace(/\/+$/, "");
  if (!trimmed) return "";
  const withProtocol = /^https?:\/\//i.test(trimmed) ? trimmed : `http://${trimmed}`;
  return new URL(withProtocol).origin;
}

function setMode(mode) {
  state.mode = mode;
  writeStoredValue(STORAGE_KEYS.mode, mode);
  appShell.classList.toggle("big-mode", mode === "big");
  fullModeButton.classList.toggle("is-active", mode === "full");
  bigModeButton.classList.toggle("is-active", mode === "big");
  fullModeButton.setAttribute("aria-pressed", String(mode === "full"));
  bigModeButton.setAttribute("aria-pressed", String(mode === "big"));
}

function saveBaseUrl(value) {
  const normalized = normalizeBaseUrl(value);
  state.baseUrl = normalized;
  writeStoredValue(STORAGE_KEYS.baseUrl, normalized);
  baseUrlLabel.textContent = normalized;
  connectionDot.className = "connection-dot";
  return normalized;
}

function openSettings(force = false) {
  ipInput.value = state.baseUrl || DEFAULT_PANEL;
  cancelSettingsButton.hidden = force;
  settingsDialog.showModal();
  requestAnimationFrame(() => ipInput.select());
}

function buildUrl(action, zone) {
  const paths = {
    on: "turn-on",
    off: "turn-off",
    switch: "switch",
  };
  const path = paths[action];
  return `${state.baseUrl}/api/v2/${path}/${zone}`;
}

function markCard(card, status, message) {
  card.classList.remove("is-working", "is-error", "is-ok");
  if (status) card.classList.add(status);
  card.querySelector(".light-status").textContent = message;
}

function sendGetCommand(url, timeoutMs = 1800) {
  if (IS_ANDROID) {
    window.location.href = `${url}${url.includes("?") ? "&" : "?"}_=${Date.now()}`;
    return Promise.resolve();
  }

  return new Promise((resolve) => {
    let finished = false;
    const done = () => {
      if (finished) return;
      finished = true;
      resolve();
    };
    const timeout = setTimeout(done, timeoutMs);

    commandFrame.onload = () => {
      clearTimeout(timeout);
      done();
    };

    commandFrame.onerror = () => {
      clearTimeout(timeout);
      done();
    };

    commandFrame.src = `${url}${url.includes("?") ? "&" : "?"}_=${Date.now()}`;
  });
}

async function sendCommand(zone, action, card) {
  if (!state.baseUrl) {
    openSettings(true);
    return;
  }

  const url = buildUrl(action, zone);
  const verb = action === "on" ? "Encendiendo" : action === "off" ? "Apagando" : "Alternando";
  markCard(card, "is-working", `${verb}...`);
  connectionDot.className = "connection-dot";

  await sendGetCommand(url);
  markCard(card, "is-ok", "Comando enviado");
  connectionDot.className = "connection-dot is-ok";
}

function toggleZone(zone, card) {
  sendCommand(zone, "switch", card);
}

function renderLights() {
  lightsGrid.textContent = "";

  for (const zone of ZONES) {
    const fragment = template.content.cloneNode(true);
    const card = fragment.querySelector(".light-card");
    const main = fragment.querySelector(".light-main");
    const icon = fragment.querySelector(".light-icon");
    const name = fragment.querySelector(".light-name");
    const zoneLabel = fragment.querySelector(".light-zone");
    const onButton = fragment.querySelector(".on-button");
    const offButton = fragment.querySelector(".off-button");

    card.dataset.zone = String(zone.id);
    icon.textContent = zone.icon;
    name.textContent = zone.name;
    zoneLabel.textContent = `Zona ${zone.id}`;
    main.setAttribute("aria-label", `Alternar ${zone.name}`);
    onButton.setAttribute("aria-label", `Encender ${zone.name}`);
    offButton.setAttribute("aria-label", `Apagar ${zone.name}`);

    main.addEventListener("click", () => toggleZone(zone.id, card));
    onButton.addEventListener("click", () => sendCommand(zone.id, "on", card));
    offButton.addEventListener("click", () => sendCommand(zone.id, "off", card));

    lightsGrid.appendChild(fragment);
  }
}

settingsButton.addEventListener("click", () => openSettings(false));
changeIpButton.addEventListener("click", () => openSettings(false));
cancelSettingsButton.addEventListener("click", () => settingsDialog.close());
fullModeButton.addEventListener("click", () => setMode("full"));
bigModeButton.addEventListener("click", () => setMode("big"));

settingsForm.addEventListener("submit", (event) => {
  event.preventDefault();
  try {
    saveBaseUrl(ipInput.value);
    settingsDialog.close();
  } catch (error) {
    ipInput.setCustomValidity("Escribe una IP o URL válida.");
    ipInput.reportValidity();
  }
});

ipInput.addEventListener("input", () => ipInput.setCustomValidity(""));

renderLights();
setMode(state.mode === "big" ? "big" : "full");
if (state.baseUrl) {
  baseUrlLabel.textContent = state.baseUrl;
} else {
  baseUrlLabel.textContent = "Sin configurar";
  openSettings(true);
}

    </script>
  </body>
</html>
